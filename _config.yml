# Site settings
title: Baptiste Macé
description: >-
  Blog de Baptiste Macé, ingénieur logiciel à Paris. Articles sur l'agilité,
  le Green IT, le DDD, l'IA responsable et le développement logiciel.
author: Baptiste Macé
email: ""
url: "https://baptistecdc.github.io"
baseurl: "/blog"

linkedin_url: "https://www.linkedin.com/in/baptiste-mac%C3%A9-1301761b/"
github_username: BaptisteCDC

# Build settings
markdown: kramdown
theme: minima

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Baptiste Macé"

# Pagination
paginate: 10
paginate_path: "/page:num/"

# Permalinks
permalink: /:year/:month/:day/:title/

# SEO
lang: fr

# Analytics — GoatCounter (https://www.goatcounter.com)
# Créer un compte sur goatcounter.com, choisir un code (ex: baptiste-mace)
# puis remplacer la valeur ci-dessous par votre code
goatcounter_code: "baptiste-mace"
